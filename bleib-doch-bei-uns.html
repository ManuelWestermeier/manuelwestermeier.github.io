<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Minimalistischer Comic – Emmaus</title>
<style>
    body {
        margin: 0;
        background: #f4f1ea;
        font-family: Arial, sans-serif;
        overflow: hidden;
        cursor: pointer;
    }

    #comic {
        width: 100vw;
        height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-direction: column;
    }

    svg {
        width: 80vw;
        max-width: 900px;
        height: 60vh;
    }

    .speech {
        font-size: 20px;
        fill: #222;
        opacity: 0;
        animation: fadeIn 1s forwards;
    }

    .label {
        font-size: 14px;
        fill: #444;
    }

    .hint {
        position: absolute;
        bottom: 20px;
        font-size: 14px;
        color: #777;
    }

    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(10px); }
        to { opacity: 1; transform: translateY(0); }
    }
</style>
</head>
<body>

<div id="comic">
    <svg id="scene" viewBox="0 0 800 500"></svg>
    <div class="hint">Click → nächste Szene</div>
</div>

<script>
const svg = document.getElementById("scene");

function drawPerson(x, color, name, halo=false) {
    return `
    ${halo ? `<circle cx="${x}" cy="210" r="35" stroke="#f2c94c" stroke-width="4" fill="none"/>` : ``}
    <circle cx="${x}" cy="250" r="25" stroke="${color}" fill="none" stroke-width="3"/>
    <line x1="${x}" y1="275" x2="${x}" y2="340" stroke="${color}" stroke-width="3"/>
    <line x1="${x}" y1="300" x2="${x-30}" y2="310" stroke="${color}" stroke-width="3"/>
    <line x1="${x}" y1="300" x2="${x+30}" y2="310" stroke="${color}" stroke-width="3"/>
    <line x1="${x}" y1="340" x2="${x-20}" y2="380" stroke="${color}" stroke-width="3"/>
    <line x1="${x}" y1="340" x2="${x+20}" y2="380" stroke="${color}" stroke-width="3"/>
    <text x="${x-40}" y="420" class="label">${name}</text>
    `;
}

const scenes = [

{
draw: function(){
svg.innerHTML = `
<rect width="800" height="500" fill="#f4f1ea"/>
<line x1="100" y1="400" x2="700" y2="400" stroke="#999" stroke-width="3"/>

${drawPerson(280, "#2d6cdf", "Kleopas")}
${drawPerson(420, "#27ae60", "Jünger")}

<text x="180" y="120" class="speech">
„Wir hofften, er sei der Retter Israels…“
</text>
`;
}
},

{
draw: function(){
svg.innerHTML = `
<rect width="800" height="500" fill="#f4f1ea"/>
<line x1="100" y1="400" x2="700" y2="400" stroke="#999" stroke-width="3"/>

${drawPerson(230, "#2d6cdf", "Kleopas")}
${drawPerson(370, "#27ae60", "Jünger")}
${drawPerson(510, "#c0392b", "Jesus", true)}

<text x="120" y="100" class="speech">
Ein Fremder schließt sich an.
</text>
`;
}
},

{
draw: function(){
svg.innerHTML = `
<rect width="800" height="500" fill="#f4f1ea"/>

<!-- Tisch -->
<rect x="250" y="320" width="300" height="15" fill="#999"/>

${drawPerson(300, "#2d6cdf", "Kleopas")}
${drawPerson(500, "#27ae60", "Jünger")}
${drawPerson(400, "#c0392b", "Jesus", true)}

<!-- Brot -->
<circle cx="400" cy="330" r="10" fill="#c0392b"/>

<text x="160" y="120" class="speech">
Beim Brotbrechen werden ihre Augen geöffnet.
</text>
`;
}
},

{
draw: function(){
svg.innerHTML = `
<rect width="800" height="500" fill="#f4f1ea"/>
<line x1="100" y1="400" x2="700" y2="400" stroke="#999" stroke-width="3"/>

${drawPerson(300, "#2d6cdf", "Kleopas")}
${drawPerson(500, "#27ae60", "Jünger")}

<text x="200" y="120" class="speech">
„Brannte nicht unser Herz?“
</text>
<text x="200" y="160" class="speech">
Sie kehren nach Jerusalem zurück.
</text>
`;
}
}

];

let current = 0;

function nextScene(){
scenes[current].draw();
current = (current + 1) % scenes.length;
}

document.body.addEventListener("click", nextScene);
nextScene();

</script>

</body>
</html>
